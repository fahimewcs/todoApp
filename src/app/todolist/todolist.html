<div class="container">
  <h1>Todo List</h1>

  <!-- Add New Todo -->
  <div class="form">
    <input
      type="text"
      placeholder="Title"
      [ngModel]="newTodoTitle()"
      (ngModelChange)="newTodoTitle.set($event)"
    />

    <input
      type="text"
      placeholder="Description"
      [ngModel]="newTodoDescription()"
      (ngModelChange)="newTodoDescription.set($event)"
    />


    <select
      [ngModel]="newTodoCategory()"
      (ngModelChange)="newTodoCategory.set($event)"
    >
      <option value="" disabled>Catergory</option>
      <option value="Daily">Daily</option>
      <option value="Monthly">Monthly</option>
      <option value="Weekly">Weekly</option>
    </select>

    <!-- <select
      [ngModel]="newTodoStatus()"

      <option value="" disabled>Status</option>
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select> -->

    <input
      type="date"
      [ngModel]="newTodoDeadline()"
      (ngModelChange)="newTodoDeadline.set($event)"
    />

    <button (click)="add()" [class.update-btn]="editId() !== null">
      {{editId() !==null ? 'Update Todo': 'Add Todo'}}
    </button>
  </div>

<div class="filter-row">
  <div class="filter-item">
    <label>Status:</label>
    <select [ngModel]="filterStatus()" (ngModelChange)="filterStatus.set($event)">
      <option value="">All</option>
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>
  </div>

  <div class="filter-item">
    <label>Category:</label>
    <select [ngModel]="filterCategory()" (ngModelChange)="filterCategory.set($event)">
      <option value="">All</option>
      <option value="Daily">Daily</option>
      <option value="Weekly">Weekly</option>
      <option value="Monthly">Monthly</option>
    </select>
  </div>

  <div class="filter-item">
    <label>Deadline:</label>
    <input type="date" [ngModel]="filterDeadline()" (ngModelChange)="filterDeadline.set($event)" />
  </div>

  <div class="filter-buttons">
    <button (click)="applyFilter()">Filter</button>
    <button (click)="resetFilter()" class="reset-btn">Reset</button>
  </div>
</div>


  <!-- Todo List -->
 <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Category</th>
        <th>Status</th>
        <th>Deadline</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (todo of filteredTodosList(); track todo.id) {
        <tr>
          <td>{{ todo.title }}</td>
          <td>{{ todo.description }}</td>
          <td>{{ todo.category }}</td>
          <td>
            <select [ngModel]="todo.status"
                    (ngModelChange)="todoService.updateTodo(todo.id,{...todo, status:$event})">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
            </select>

          </td>
          <td>{{ todo.deadline | date:'mediumDate' }}</td>
          <td>
            <button class="edit-btn" (click)="editTodo(todo.id)">Edit</button>
            <button class="delete-btn" (click)="deleteTodo(todo.id)">Delete</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
