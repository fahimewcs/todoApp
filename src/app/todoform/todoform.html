<div class="container">
  <h1>Add New Todo</h1>

  <form [formGroup]="todoForm" (ngSubmit)="submit()">

    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" formControlName="title" placeholder="Enter Title" />
        <div class="error" *ngIf="todoForm.get('title')?.invalid && todoForm.get('title')?.touched">
          Title is required
        </div>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select formControlName="category">
          <option value="" disabled>Select</option>
          <option value="Development">Development</option>
          <option value="UI/UX">UI/UX Design</option>
          <option value="QA">QA</option>
          <option value="DevOps">DevOps</option>
          <option value="Database">DB Design</option>
          <option value="Business Analysis">Business Analysis</option>
        </select>
        <div class="error" *ngIf="todoForm.get('category')?.invalid && todoForm.get('category')?.touched">
          Category is required
        </div>
      </div>

      <div class="form-group description">
        <label>Description</label>
        <input type="text" formControlName="description" placeholder="Enter Description" />
      </div>
    </div>

    <!-- Row 2: Priority, Start Date, End Date -->
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select formControlName="priority">
          <option value="" disabled>Select</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
          <option value="Critical">Critical</option>
        </select>
      </div>

      <!-- <div class="form-group">
        <label>Status</label>
        <select formControlName="status">
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div> -->

      <!-- <div class="form-group">
        <label>Assigned To</label>
        <select formControlName="assignedTo">
          <option value="" disabled>Select</option>
          <option value="Abir">Abir</option>
          <option value="Raihan">Raihan</option>
          <option value="Navid">Navid</option>
          <option value="Khalid">Khalid</option>
        </select>
      </div> -->

      <div class="form-group">
        <label>Start Date</label>
        <input type="date" formControlName="startDate" />
      </div>

      <div class="form-group">
        <label>End Date</label>
        <input type="date" formControlName="endDate" />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="todoForm.invalid">
        Submit
      </button>
      <button type="button" [routerLink]="'/todoform'">Cancel</button>
    </div>
  </form>
</div>
