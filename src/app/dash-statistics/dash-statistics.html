<div class="stats">

  <div class="card total">
    <h3>Total Tasks</h3>
    <p>{{ totalTasks() }}</p>
  </div>

  <div class="card completed">
    <h3>Completed</h3>
    <p>{{ completedTasks() }}</p>
  </div>

  <div class="card pending">
    <h3>Pending</h3>
    <p>{{ pendingTasks() }}</p>
  </div>

  <div class="card high-priority">
    <h3>High Priority</h3>
    <p>{{ highPriorityTasks() }}</p>
  </div>

</div>
